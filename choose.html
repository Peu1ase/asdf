<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자리 선택 - 2학기 자리배정</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 0.95em;
        }

        .content {
            padding: 40px;
        }

        .section-title {
            color: #333;
            font-size: 1.5em;
            margin-bottom: 30px;
            text-align: center;
        }

        .seating-area {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }

        .table {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            border: 2px solid #e0e0e0;
        }

        .table-title {
            text-align: center;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            font-size: 1.1em;
        }

        .seats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .seat {
            background: white;
            border: 2px solid #ddd;
            padding: 15px;
            text-align: center;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            color: #333;
        }

        .seat:hover {
            border-color: #667eea;
            background: #f0f4ff;
            transform: translateY(-2px);
        }

        .seat.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .seat.completed {
            background: #4caf50;
            color: white;
            border-color: #4caf50;
            cursor: not-allowed;
        }

        .seat.completed:hover {
            transform: none;
            background: #4caf50;
            cursor: not-allowed;
        }

        .seat small {
            display: block;
            font-size: 0.75em;
            margin-top: 3px;
            font-weight: normal;
        }

        .status-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin: 40px 0;
            padding: 30px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .status-item {
            text-align: center;
        }

        .status-box {
            width: 60px;
            height: 60px;
            border-radius: 6px;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .status-box.selecting {
            background: #667eea;
            color: white;
        }

        .status-box.completed {
            background: #4caf50;
            color: white;
        }

        .status-label {
            color: #666;
            font-size: 0.9em;
            font-weight: 600;
        }

        .action-section {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid #eee;
        }

        .btn {
            padding: 12px 30px;
            font-size: 1em;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #4caf50;
            color: white;
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(76, 175, 80, 0.4);
        }

        .btn-back {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #ddd;
        }

        .btn-back:hover {
            background: #e8e8e8;
            border-color: #667eea;
            color: #667eea;
        }

        .selected-info {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            margin: 20px 0;
            border-radius: 4px;
            text-align: center;
            color: #333;
        }

        .selected-info p {
            margin: 5px 0;
        }

        @media (max-width: 768px) {
            .content {
                padding: 20px;
            }

            .seating-area {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.5em;
            }

            .btn {
                padding: 10px 20px;
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>자리 선택</h1>
            <p>원하는 자리를 선택한 후 '선택 완료' 버튼을 클릭하세요</p>
        </div>

        <div class="content">
            <div class="status-info">
                <div class="status-item">
                    <div class="status-box selecting"></div>
                    <div class="status-label">선택중</div>
                </div>
                <div class="status-item">
                    <div class="status-box completed"></div>
                    <div class="status-label">선택 완료</div>
                </div>
            </div>

            <div id="selectedInfo" class="selected-info" style="display: none;">
                <p>선택한 자리: <strong id="selectedSeat">-</strong></p>
            </div>

            <h2 class="section-title">테이블 배치도</h2>

            <div class="seating-area">
                <div class="table">
                    <div class="table-title">테이블 1</div>
                    <div class="seats-grid">
                        <div class="seat" data-seat="1-1">1-1</div>
                        <div class="seat" data-seat="1-2">1-2</div>
                        <div class="seat" data-seat="1-3">1-3</div>
                        <div class="seat" data-seat="1-4">1-4</div>
                        <div class="seat" data-seat="1-5">1-5</div>
                        <div class="seat" data-seat="1-6">1-6</div>
                        <div class="seat" data-seat="1-7">1-7</div>
                        <div class="seat" data-seat="1-8">1-8</div>
                    </div>
                </div>

                <div class="table">
                    <div class="table-title">테이블 2</div>
                    <div class="seats-grid">
                        <div class="seat" data-seat="2-1">2-1</div>
                        <div class="seat" data-seat="2-2">2-2</div>
                        <div class="seat" data-seat="2-3">2-3</div>
                        <div class="seat" data-seat="2-4">2-4</div>
                        <div class="seat" data-seat="2-5">2-5</div>
                        <div class="seat" data-seat="2-6">2-6</div>
                        <div class="seat" data-seat="2-7">2-7</div>
                        <div class="seat" data-seat="2-8">2-8</div>
                    </div>
                </div>

                <div class="table">
                    <div class="table-title">테이블 3</div>
                    <div class="seats-grid">
                        <div class="seat" data-seat="3-1">3-1</div>
                        <div class="seat" data-seat="3-2">3-2</div>
                        <div class="seat" data-seat="3-3">3-3</div>
                        <div class="seat" data-seat="3-4">3-4</div>
                        <div class="seat" data-seat="3-5">3-5</div>
                        <div class="seat" data-seat="3-6">3-6</div>
                        <div class="seat" data-seat="3-7">3-7</div>
                    </div>
                </div>

                <div class="table">
                    <div class="table-title">테이블 4</div>
                    <div class="seats-grid">
                        <div class="seat" data-seat="4-1">4-1</div>
                        <div class="seat" data-seat="4-2">4-2</div>
                        <div class="seat" data-seat="4-3">4-3</div>
                        <div class="seat" data-seat="4-4">4-4</div>
                        <div class="seat" data-seat="4-5">4-5</div>
                        <div class="seat" data-seat="4-6">4-6</div>
                        <div class="seat" data-seat="4-7">4-7</div>
                    </div>
                </div>
            </div>

            <div class="action-section">
                <a href="index.html" class="btn btn-back">뒤로가기</a>
                <button id="btnClear" class="btn btn-primary">선택 취소</button>
                <button id="btnComplete" class="btn btn-secondary">선택 완료</button>
            </div>
        </div>
    </div>


</body>
</html>
