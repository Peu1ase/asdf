<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자리 선택 - 2학기 자리배정</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 0.95em;
        }

        .content {
            padding: 40px;
        }

        .section-title {
            color: #333;
            font-size: 1.5em;
            margin-bottom: 30px;
            text-align: center;
        }

        .seating-area {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }

        .table {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            border: 2px solid #e0e0e0;
        }

        .table-title {
            text-align: center;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            font-size: 1.1em;
        }

        .seats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .seat {
            background: white;
            border: 2px solid #ddd;
            padding: 15px;
            text-align: center;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            color: #333;
        }

        .seat:hover {
            border-color: #667eea;
            background: #f0f4ff;
            transform: translateY(-2px);
        }

        .seat.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .seat.completed {
            background: #4caf50;
            color: white;
            border-color: #4caf50;
            cursor: not-allowed;
        }

        .seat.completed:hover {
            transform: none;
            background: #4caf50;
            cursor: not-allowed;
        }

        .seat small {
            display: block;
            font-size: 0.75em;
            margin-top: 3px;
            font-weight: normal;
        }

        .status-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin: 40px 0;
            padding: 30px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .status-item {
            text-align: center;
        }

        .status-box {
            width: 60px;
            height: 60px;
            border-radius: 6px;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .status-box.selecting {
            background: #667eea;
            color: white;
        }

        .status-box.completed {
            background: #4caf50;
            color: white;
        }

        .status-label {
            color: #666;
            font-size: 0.9em;
            font-weight: 600;
        }

        .action-section {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid #eee;
        }

        .btn {
            padding: 12px 30px;
            font-size: 1em;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #4caf50;
            color: white;
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(76, 175, 80, 0.4);
        }

        .btn-back {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #ddd;
        }

        .btn-back:hover {
            background: #e8e8e8;
            border-color: #667eea;
            color: #667eea;
        }

        .selected-info {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            margin: 20px 0;
            border-radius: 4px;
            text-align: center;
            color: #333;
        }

        .selected-info p {
            margin: 5px 0;
        }

        @media (max-width: 768px) {
            .content {
                padding: 20px;
            }

            .seating-area {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.5em;
            }

            .btn {
                padding: 10px 20px;
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>자리 선택</h1>
            <p>원하는 자리를 선택한 후 '선택 완료' 버튼을 클릭하세요</p>
        </div>

        <div class="content">
            <div class="status-info">
                <div class="status-item">
                    <div class="status-box selecting"></div>
                    <div class="status-label">선택중</div>
                </div>
                <div class="status-item">
                    <div class="status-box completed"></div>
                    <div class="status-label">선택 완료</div>
                </div>
            </div>

            <div id="selectedInfo" class="selected-info" style="display: none;">
                <p>선택한 자리: <strong id="selectedSeat">-</strong></p>
            </div>

            <h2 class="section-title">테이블 배치도</h2>
            <h3 style="text-align: center; margin: 20px;">칠판</h3>

            <div class="seating-area">
                <div class="table">
                    <div class="table-title">테이블 1</div>
                    <div class="seats-grid">
                        <div class="seat" data-seat="1-1" onclick="selectSeat(this, '1-1')">1-1</div>
                        <div class="seat" data-seat="1-2" onclick="selectSeat(this, '1-2')">1-2</div>
                        <div class="seat" data-seat="1-3" onclick="selectSeat(this, '1-3')">1-3</div>
                        <div class="seat" data-seat="1-4" onclick="selectSeat(this, '1-4')">1-4</div>
                        <div class="seat" data-seat="1-5" onclick="selectSeat(this, '1-5')">1-5</div>
                        <div class="seat" data-seat="1-6" onclick="selectSeat(this, '1-6')">1-6</div>
                        <div class="seat" data-seat="1-7" onclick="selectSeat(this, '1-7')">1-7</div>
                        <div class="seat" data-seat="1-8" onclick="selectSeat(this, '1-8')">1-8</div>
                    </div>
                </div>

                <div class="table">
                    <div class="table-title">테이블 2</div>
                    <div class="seats-grid">
                        <div class="seat" data-seat="2-1" onclick="selectSeat(this, '2-1')">2-1</div>
                        <div class="seat" data-seat="2-2" onclick="selectSeat(this, '2-2')">2-2</div>
                        <div class="seat" data-seat="2-3" onclick="selectSeat(this, '2-3')">2-3</div>
                        <div class="seat" data-seat="2-4" onclick="selectSeat(this, '2-4')">2-4</div>
                        <div class="seat" data-seat="2-5" onclick="selectSeat(this, '2-5')">2-5</div>
                        <div class="seat" data-seat="2-6" onclick="selectSeat(this, '2-6')">2-6</div>
                        <div class="seat" data-seat="2-7" onclick="selectSeat(this, '2-7')">2-7</div>
                        <div class="seat" data-seat="2-8" onclick="selectSeat(this, '2-8')">2-8</div>
                    </div>
                </div>

                <div class="table">
                    <div class="table-title">테이블 3</div>
                    <div class="seats-grid">
                        <div class="seat" data-seat="3-1" onclick="selectSeat(this, '3-1')">3-1</div>
                        <div class="seat" data-seat="3-2" onclick="selectSeat(this, '3-2')">3-2</div>
                        <div class="seat" data-seat="3-3" onclick="selectSeat(this, '3-3')">3-3</div>
                        <div class="seat" data-seat="3-4" onclick="selectSeat(this, '3-4')">3-4</div>
                        <div class="seat" data-seat="3-5" onclick="selectSeat(this, '3-5')">3-5</div>
                        <div class="seat" data-seat="3-6" onclick="selectSeat(this, '3-6')">3-6</div>
                        <div class="seat" data-seat="3-7" onclick="selectSeat(this, '3-7')">3-7</div>
                    </div>
                </div>

                <div class="table">
                    <div class="table-title">테이블 4</div>
                    <div class="seats-grid">
                        <div class="seat" data-seat="4-1" onclick="selectSeat(this, '4-1')">4-1</div>
                        <div class="seat" data-seat="4-2" onclick="selectSeat(this, '4-2')">4-2</div>
                        <div class="seat" data-seat="4-3" onclick="selectSeat(this, '4-3')">4-3</div>
                        <div class="seat" data-seat="4-4" onclick="selectSeat(this, '4-4')">4-4</div>
                        <div class="seat" data-seat="4-5" onclick="selectSeat(this, '4-5')">4-5</div>
                        <div class="seat" data-seat="4-6" onclick="selectSeat(this, '4-6')">4-6</div>
                        <div class="seat" data-seat="4-7" onclick="selectSeat(this, '4-7')">4-7</div>
                    </div>
                </div>
            </div>

            <div class="action-section">
                <a href="index.html" class="btn btn-back">뒤로가기</a>
                <button class="btn btn-primary" onclick="clearSelection()">선택 취소</button>
                <button class="btn btn-secondary" onclick="completeSelection()">선택 완료</button>
            </div>
        </div>
    </div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
    // 💡 사용자님의 Firebase 고유 설정값 적용 완료!
    const firebaseConfig = {
        apiKey: "AIzaSyC75RiPZjAbuAUws_iZboHxB2cJZZ9rskA",
        authDomain: "class-7a4ed.firebaseapp.com",
        projectId: "class-7a4ed",
        storageBucket: "class-7a4ed.firebasestorage.app",
        messagingSenderId: "789754864267",
        appId: "1:789754864267:web:9fd120f57ef20448f1ea8e"
    };

    // Firebase 초기화
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentSelected = null;
    let userSeats = {};

    // DB에서 실시간으로 데이터 변화를 감지하여 화면을 업데이트합니다.
    window.addEventListener('load', function() {
        db.collection("seats").doc("currentLayout")
            .onSnapshot((doc) => {
                if (doc.exists) {
                    userSeats = doc.data();
                } else {
                    userSeats = {};
                }
                resetAllSeatsUI(); 
                restoreSeatsUI();
            });
    });

    // 화면의 모든 자리를 초기 상태(흰색)로 리셋하는 함수
    function resetAllSeatsUI() {
        const allSeats = document.querySelectorAll('.seat');
        allSeats.forEach(element => {
            const seatId = element.getAttribute('data-seat');
            element.classList.remove('completed', 'selected');
            element.innerHTML = seatId;
        });
    }

    function restoreSeatsUI() {
        for (let seatId in userSeats) {
            const seatInfo = userSeats[seatId];
            const element = document.querySelector(`.seat[data-seat="${seatId}"]`);
            
            if (element && seatInfo.status === 'completed') {
                element.classList.add('completed');
                element.innerHTML = `${seatId} <br><small>(${seatInfo.userName})</small>`;
            }
        }
    }

    function selectSeat(element, seatId) {
        if (element.classList.contains('completed')) {
            const completedSeat = userSeats[seatId];
            const currentUserName = localStorage.getItem('userName') || '사용자';

            if (completedSeat && completedSeat.userName === currentUserName) {
                if (confirm(`${seatId} 자리를 취소하시겠습니까?`)) {
                    delete userSeats[seatId];
                    db.collection("seats").doc("currentLayout").set(userSeats)
                        .then(() => {
                            if (currentSelected === element) currentSelected = null;
                            document.getElementById('selectedInfo').style.display = 'none';
                            alert('자리가 취소되었습니다.');
                        });
                }
                return;
            } 
            
            if (completedSeat && completedSeat.userName) {
                alert(`${completedSeat.userName}님이 이미 선택한 자리입니다.`);
            } else {
                alert('이미 선택 완료된 자리입니다.');
            }
            return;
        }

        if (currentSelected === element) {
            clearSelection();
            return;
        }

        if (currentSelected && currentSelected !== element) {
            alert('이미 선택 중인 자리가 있습니다. 먼저 선택 취소를 해주세요.');
            return;
        }

        element.classList.add('selected');
        currentSelected = element;

        const infoDiv = document.getElementById('selectedInfo');
        document.getElementById('selectedSeat').textContent = seatId;
        infoDiv.style.display = 'block';
    }

    function clearSelection() {
        if (currentSelected) {
            currentSelected.classList.remove('selected');
            currentSelected = null;
        }
        document.getElementById('selectedInfo').style.display = 'none';
    }

    function completeSelection() {
        if (!currentSelected) {
            alert('자리를 선택해주세요.');
            return;
        }

        const seatId = document.getElementById('selectedSeat').textContent;
        const userName = localStorage.getItem('userName') || '사용자';

        // 중복 선택 방지 (이미 다른 자리를 선점했는지 확인)
        for (let existingSeatId in userSeats) {
            if (userSeats[existingSeatId].userName === userName) {
                alert(`이미 ${existingSeatId} 자리를 선택하셨습니다. 한 사람당 한 자리만 선택할 수 있습니다.\n기존 자리를 취소한 후 다시 시도해주세요.`);
                return;
            }
        }

        // DB에 내 자리 정보 추가하여 저장
        userSeats[seatId] = {
            status: 'completed',
            userName: userName
        };

        db.collection("seats").doc("currentLayout").set(userSeats)
            .then(() => {
                alert(`${userName}님이 ${seatId} 자리를 성공적으로 선택했습니다.`);
                currentSelected = null;
                document.getElementById('selectedInfo').style.display = 'none';
            })
            .catch((error) => {
                alert("저장 중 오류가 발생했습니다: " + error.message);
            });
    }
</script>
</body>
</html>
