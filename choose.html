<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자리 선택 - 2학기 자리배정</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 0.95em;
        }

        .content {
            padding: 40px;
        }

        .section-title {
            color: #333;
            font-size: 1.5em;
            margin-bottom: 30px;
            text-align: center;
        }

        .seating-area {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }

        .table {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            border: 2px solid #e0e0e0;
        }

        .table-title {
            text-align: center;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            font-size: 1.1em;
        }

        .seats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .seat {
            background: white;
            border: 2px solid #ddd;
            padding: 15px;
            text-align: center;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            color: #333;
        }

        .seat:hover {
            border-color: #667eea;
            background: #f0f4ff;
            transform: translateY(-2px);
        }

        .seat.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .seat.completed {
            background: #4caf50;
            color: white;
            border-color: #4caf50;
            cursor: not-allowed;
        }

        .seat.completed:hover {
            transform: none;
            background: #4caf50;
            cursor: not-allowed;
        }

        .seat small {
            display: block;
            font-size: 0.75em;
            margin-top: 3px;
            font-weight: normal;
        }

        .status-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin: 40px 0;
            padding: 30px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .status-item {
            text-align: center;
        }

        .status-box {
            width: 60px;
            height: 60px;
            border-radius: 6px;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .status-box.selecting {
            background: #667eea;
            color: white;
        }

        .status-box.completed {
            background: #4caf50;
            color: white;
        }

        .status-label {
            color: #666;
            font-size: 0.9em;
            font-weight: 600;
        }

        .action-section {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid #eee;
        }

        .btn {
            padding: 12px 30px;
            font-size: 1em;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #4caf50;
            color: white;
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(76, 175, 80, 0.4);
        }

        .btn-back {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #ddd;
        }

        .btn-back:hover {
            background: #e8e8e8;
            border-color: #667eea;
            color: #667eea;
        }

        .selected-info {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            margin: 20px 0;
            border-radius: 4px;
            text-align: center;
            color: #333;
        }

        .selected-info p {
            margin: 5px 0;
        }

        @media (max-width: 768px) {
            .content {
                padding: 20px;
            }

            .seating-area {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.5em;
            }

            .btn {
                padding: 10px 20px;
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>자리 선택</h1>
            <p>원하는 자리를 선택한 후 '선택 완료' 버튼을 클릭하세요</p>
        </div>

        <div class="content">
            <div class="status-info">
                <div class="status-item">
                    <div class="status-box selecting"></div>
                    <div class="status-label">선택중</div>
                </div>
                <div class="status-item">
                    <div class="status-box completed"></div>
                    <div class="status-label">선택 완료</div>
                </div>
            </div>

            <div id="selectedInfo" class="selected-info" style="display: none;">
                <p>선택한 자리: <strong id="selectedSeat">-</strong></p>
            </div>

            <h2 class="section-title">테이블 배치도</h2>

            <div class="seating-area">
                <div class="table">
                    <div class="table-title">테이블 1</div>
                    <div class="seats-grid">
                        <div class="seat" data-seat="1-1">1-1</div>
                        <div class="seat" data-seat="1-2">1-2</div>
                        <div class="seat" data-seat="1-3">1-3</div>
                        <div class="seat" data-seat="1-4">1-4</div>
                        <div class="seat" data-seat="1-5">1-5</div>
                        <div class="seat" data-seat="1-6">1-6</div>
                        <div class="seat" data-seat="1-7">1-7</div>
                        <div class="seat" data-seat="1-8">1-8</div>
                    </div>
                </div>

                <div class="table">
                    <div class="table-title">테이블 2</div>
                    <div class="seats-grid">
                        <div class="seat" data-seat="2-1">2-1</div>
                        <div class="seat" data-seat="2-2">2-2</div>
                        <div class="seat" data-seat="2-3">2-3</div>
                        <div class="seat" data-seat="2-4">2-4</div>
                        <div class="seat" data-seat="2-5">2-5</div>
                        <div class="seat" data-seat="2-6">2-6</div>
                        <div class="seat" data-seat="2-7">2-7</div>
                        <div class="seat" data-seat="2-8">2-8</div>
                    </div>
                </div>

                <div class="table">
                    <div class="table-title">테이블 3</div>
                    <div class="seats-grid">
                        <div class="seat" data-seat="3-1">3-1</div>
                        <div class="seat" data-seat="3-2">3-2</div>
                        <div class="seat" data-seat="3-3">3-3</div>
                        <div class="seat" data-seat="3-4">3-4</div>
                        <div class="seat" data-seat="3-5">3-5</div>
                        <div class="seat" data-seat="3-6">3-6</div>
                        <div class="seat" data-seat="3-7">3-7</div>
                    </div>
                </div>

                <div class="table">
                    <div class="table-title">테이블 4</div>
                    <div class="seats-grid">
                        <div class="seat" data-seat="4-1">4-1</div>
                        <div class="seat" data-seat="4-2">4-2</div>
                        <div class="seat" data-seat="4-3">4-3</div>
                        <div class="seat" data-seat="4-4">4-4</div>
                        <div class="seat" data-seat="4-5">4-5</div>
                        <div class="seat" data-seat="4-6">4-6</div>
                        <div class="seat" data-seat="4-7">4-7</div>
                    </div>
                </div>
            </div>

            <div class="action-section">
                <a href="index.html" class="btn btn-back">뒤로가기</a>
                <button id="btnClear" class="btn btn-primary">선택 취소</button>
                <button id="btnComplete" class="btn btn-secondary">선택 완료</button>
            </div>
        </div>
    </div>

<script type="module">
    // 1. 제공해주신 v12.15.0 버전 주소에 맞춰 Firebase 앱 및 Firestore 라이브러리를 로드합니다.
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getFirestore, doc, setDoc, deleteDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    // 2. 제공해주신 Firebase 설정 정보
    const firebaseConfig = {
        apiKey: "AIzaSyA9oI4We0cIgUZYmlQtXB8zM2v5GuqrthE",
        authDomain: "homepage-fa760.firebaseapp.com",
        projectId: "homepage-fa760",
        storageBucket: "homepage-fa760.firebasestorage.app",
        messagingSenderId: "7065068346",
        appId: "1:7065068346:web:7e9dee68776a7dc234a603",
        measurementId: "G-QKP76CWVP2"
    };

    // 3. Firebase 및 Firestore(DB) 초기화
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentSelected = null;
    let serverSeats = {}; // 서버에서 실시간으로 받아온 좌석 데이터 저장고

    // 4. 실시간 데이터 감시 (onSnapshot)
    onSnapshot(collection(db, "seats"), (snapshot) => {
        // 모든 좌석 UI 초기화
        document.querySelectorAll('.seat').forEach(el => {
            const seatId = el.getAttribute('data-seat');
            el.classList.remove('completed');
            el.classList.remove('selected');
            el.innerHTML = seatId;
        });
        
        serverSeats = {};

        // 서버 데이터를 읽어서 화면 실시간 갱신
        snapshot.forEach((doc) => {
            const seatId = doc.id;
            const seatInfo = doc.data();
            serverSeats[seatId] = seatInfo;

            const element = document.querySelector(`.seat[data-seat="${seatId}"]`);
            if (element) {
                element.classList.add('completed');
                element.innerHTML = `${seatId} <br><small>(${seatInfo.userName})</small>`;
            }
        });

        // 선택중이던 자리가 타인에 의해 선점되었을 때 처리
        if (currentSelected) {
            const selSeatId = currentSelected.getAttribute('data-seat');
            if (serverSeats[selSeatId]) {
                currentSelected = null;
                document.getElementById('selectedInfo').style.display = 'none';
            } else {
                currentSelected.classList.add('selected');
            }
        }
    });

    // 5. 좌석 클릭 이벤트 활성화
    document.querySelectorAll('.seat').forEach(seatEl => {
        seatEl.addEventListener('click', function() {
            const seatId = this.getAttribute('data-seat');
            
            // 이미 예약 완료된 자리인 경우
            if (this.classList.contains('completed')) {
                const completedSeat = serverSeats[seatId];
                const currentUserName = localStorage.getItem('userName') || '사용자';

                // 본인이 예약한 자리인 경우 취소 기능 제공
                if (completedSeat && completedSeat.userName === currentUserName) {
                    if (confirm(`${seatId} 자리를 취소하시겠습니까?`)) {
                        deleteDoc(doc(db, "seats", seatId))
                            .then(() => alert('자리가 취소되었습니다.'))
                            .catch((error) => alert('취소 실패: ' + error));
                        
                        if (currentSelected === this) currentSelected = null;
                        document.getElementById('selectedInfo').style.display = 'none';
                    }
                    return;
                } 
                
                // 다른 사람이 선점한 자리인 경우
                if (completedSeat && completedSeat.userName) {
                    alert(`${completedSeat.userName}님이 이미 선택한 자리입니다.`);
                } else {
                    alert('이미 선택 완료된 자리입니다.');
                }
                return;
            }

            // 선택된 자리 다시 누르면 해제 (토글)
            if (currentSelected === this) {
                clearSelection();
                return;
            }

            // 이미 다른 자리를 가선택하고 있는 경우
            if (currentSelected && currentSelected !== this) {
                alert('이미 선택 중인 자리가 있습니다. 먼저 선택 취소를 해주세요.');
                return;
            }

            // 임시 선택 상태 표시
            this.classList.add('selected');
            currentSelected = this;

            const infoDiv = document.getElementById('selectedInfo');
            document.getElementById('selectedSeat').textContent = seatId;
            infoDiv.style.display = 'block';
        });
    });

    // 6. 선택 취소 처리 함수
    function clearSelection() {
        if (currentSelected) {
            currentSelected.classList.remove('selected');
            currentSelected = null;
        }
        document.getElementById('selectedInfo').style.display = 'none';
    }
    document.getElementById('btnClear').addEventListener('click', clearSelection);

    // 7. 선택 완료 (서버 최종 데이터 전송)
    document.getElementById('btnComplete').addEventListener('click', async function() {
        if (!currentSelected) {
            alert('자리를 선택해주세요.');
            return;
        }

        const seatId = document.getElementById('selectedSeat').textContent;
        const userName = localStorage.getItem('userName') || '사용자';

        // 중복 예약 방지 기능 (1인 1석 제한 정책)
        for (let existingSeatId in serverSeats) {
            if (serverSeats[existingSeatId].userName === userName) {
                alert(`이미 ${existingSeatId} 자리를 선택하셨습니다. 한 사람당 한 자리만 선택할 수 있습니다.\n기존 자리를 취소한 후 다시 시도해주세요.`);
                return;
            }
        }

        // Firestore 데이터베이스에 최종 업로드
        try {
            await setDoc(doc(db, "seats", seatId), {
                status: 'completed',
                userName: userName,
                timestamp: new Date()
            });
            
            alert(`${userName}님이 ${seatId} 자리를 성공적으로 선택했습니다.`);
            currentSelected = null;
            document.getElementById('selectedInfo').style.display = 'none';
        } catch (error) {
            alert("자리 저장에 실패했습니다: " + error);
        }
    });
</script>
</body>
</html>
