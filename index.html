<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2학기 자리배정 - 대학교 좌석 선택 시스템</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
       }


        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .bold {
            font-weight: Bold;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            max-width: 900px;
            width: 100%;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 60px 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
            line-height: 1.6;
        }

        .content {
            padding: 60px 40px;
            text-align: center;
        }

        .intro-section {
            margin-bottom: 50px;
        }

        .intro-section h2 {
            color: #333;
            font-size: 1.8em;
            margin-bottom: 20px;
        }

        .intro-section p {
            color: #666;
            font-size: 1.1em;
            line-height: 1.8;
            margin-bottom: 15px;
        }

        .action-section {
            margin-top: 50px;
        }

        .btn-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.1em;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #ddd;
        }

        .btn-secondary:hover {
            background: #e8e8e8;
            border-color: #667eea;
            color: #667eea;
        }

        .footer {
            background: #f8f9fa;
            padding: 30px;
            text-align: center;
            color: #666;
            font-size: 0.9em;
            border-top: 1px solid #eee;
        }

        @media (max-width: 768px) {
            .header {
                padding: 40px 20px;
            }

            .header h1 {
                font-size: 2em;
            }

            .content {
                padding: 40px 20px;
            }

            .btn {
                padding: 12px 30px;
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎓 2학기 자리배정</h1>
            <p>대학교 자리를 선착순으로 선택할 수 있는 시스템</p>
        </div>

        <div class="content">
            <div class="intro-section">
                <h2>편리한 자리 선택 홈페이지</h2>
                <p>해당 홈페이지는 A반 학우분들께서 2학기 자리를 선택하기 위해 제작한 사이트입니다. 실시간으로 자리 배치도를 확인하고 선택 현황을 관리할 수 있어 복잡한 절차 없이 간편하게 자리를 선택할 수 있습니다.</p>
                <div class="bold">
                    <p>내 정보 입력하기를 통해 성명을 작성한 뒤 자리를 선택할 수 있습니다.</p>
                </div>
            </div>

            <div class="action-section">
                <div class="btn-container">
                    <a href="who.html" class="btn btn-secondary">내 정보 입력하기</a>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>2026 한국폴리텍대학교 A반 자리배정 시스템 | 건의사항은 010-4030-9096 으로 연락주세요.</p>
        </div>
    </div>
</body>
</html>
